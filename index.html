<!DOCTYPE html>
<html>
  <head>
    <title>إياد أبو ماهر - مطور مواقع</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial;
        background-color: #f0f2f5;
        direction: rtl;
      }
      .رأس {
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        text-align: center;
        padding: 60px 20px;
      }
      .رأس h1 {
        font-size: 42px;
        margin-bottom: 10px;
      }
      .رأس p {
        font-size: 18px;
        opacity: 0.8;
      }
      .قسم {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 20px;
      }
      .قسم h2 {
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 24px;
        border-right: 4px solid #3498db;
        padding-right: 10px;
      }
      .بطاقات {
        display: flex;
        gap: 20px;
      }
      .بطاقة {
        background: white;
        border-radius: 12px;
        padding: 25px;
        flex: 1;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        text-align: center;
      }
      .بطاقة h3 {
        color: #3498db;
        margin-bottom: 10px;
      }
      .تواصل {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      }
      .تواصل input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
      }
      .تواصل button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #2c3e50, #3498db);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        cursor: pointer;
        margin-top: 10px;
      }
      @media (max-width: 600px) {
        .بطاقات {
          flex-direction: column;
        }
        .رأس h1 {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>

    <div class="رأس">
      <h1>إياد أبو ماهر</h1>
      <p>مطور مواقع متخصص 🚀</p>
    </div>

    <div class="قسم">
      <h2>من أنا</h2>
      <div class="بطاقة" style="text-align:right;">
        <p>مرحباً، أنا إياد من سوريا أعيش في تركيا، أتعلم تطوير المواقع لأبني مستقبلاً أفضل لعائلتي.</p>
      </div>
    </div>

    <div class="قسم">
      <h2>مهاراتي</h2>
      <div class="بطاقات">
        <div class="بطاقة">
          <h3>🎨 HTML</h3>
          <p>هيكل المواقع</p>
        </div>
        <div class="بطاقة">
          <h3>✨ CSS</h3>
          <p>تصميم وألوان</p>
        </div>
        <div class="بطاقة">
          <h3>⚡ JavaScript</h3>
          <p>تفاعل وحركة</p>
        </div>
      </div>
    </div>

    <div class="قسم">
      <h2>تواصل معي</h2>
      <div class="تواصل">
        <input id="خانةالاسم" type="text" placeholder="اسمك">
        <input type="email" placeholder="بريدك الإلكتروني">
        <button onclick="قلمرحبا()">إرسال ✉️</button>
      </div>
    </div>

    <script>
      function قلمرحبا() {
        let اسم = document.getElementById("خانةالاسم").value;
        if (اسم == "") {
          alert("من فضلك اكتب اسمك أولاً!");
        } else {
          alert("مرحباً " + اسم + "! شكراً لتواصلك معي.");
        }
      }
    </script>

  </body>
</html>
